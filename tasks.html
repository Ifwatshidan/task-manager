<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container">

    <a class="navbar-brand fw-bold">Task Manager</a>

    <!-- SEARCH -->
    <form class="d-flex ms-3" onsubmit="handleSearch(event)">
      <input type="text" id="searchInput" class="form-control me-2" placeholder="Search task">
      <button class="btn btn-light rounded-circle">
        <i class="bi bi-search"></i>
      </button>
    </form>

    <div class="d-flex align-items-center">

      <a href="dashboard.html" class="nav-link text-white mx-2 nav-hover">Dashboard</a>
      <a href="tasks.html" class="nav-link text-white mx-2 nav-hover">Tasks</a>
      <a href="completed.html" class="nav-link text-white mx-2 nav-hover">Completed</a>
      <a href="notes.html" class="nav-link text-white mx-2 nav-hover">Notes</a>

      <button id="themeToggle" class="btn btn-light ms-3">
       <i class="bi bi-moon"></i>
      </button>

      <a href="login.html" class="btn btn-danger btn-sm ms-3" onclick="logout()">Logout</a>
    </div>

  </div>
</nav>

<div class="container mt-4 flex-grow-1">

<div style="margin-top: 90px;" class="container">

<h3 class="mb-4">Task Management</h3>

<!-- FORM -->
<div class="card p-4 shadow-sm border-0 mb-4">

<h4 id="formTitle">Add New Task</h4>

<form onsubmit="handleSubmit(event)">

  <input type="hidden" id="editIndex">

  <label class="form-label fw-semibold">Task Name</label>
  <input type="text" id="name" class="form-control mb-3">

  <label class="form-label fw-semibold">Status</label>
  <select id="status" class="form-control mb-3">
    <option value="pending">Pending</option>
    <option value="in progress">In Progress</option>
    <option value="completed">Completed</option>
  </select>

  <label class="form-label fw-semibold">Due Date</label>
  <input type="date" id="due" class="form-control mb-3">

  <label class="form-label fw-semibold">Task Notes</label>
  <textarea id="notes" class="form-control mb-3"></textarea>

  <button class="btn btn-primary" id="submitBtn">Add Task</button>

</form>

</div>

<!-- TABLE -->
<div class="card p-4 shadow-sm border-0">

<h5>Task List</h5>

<table class="table mt-3">
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Due</th>
<th>Action</th>
</tr>
</thead>

<tbody id="taskTable"></tbody>

</table>

</div>

</div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 Task Manager System | Built by Ifwat
</footer>

<script>

// login check
if (!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}

// load tasks
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let searchQuery = "";

// render
function renderTasks() {

  let html = "";

  let filtered = tasks.filter(task =>
    task.name.toLowerCase().includes(searchQuery.toLowerCase())
  );

  if (filtered.length === 0) {
    html = `<tr><td colspan="4" class="text-center">No matching tasks</td></tr>`;
  }

  filtered.forEach((task, index) => {

    let name = task.name;

    if (searchQuery !== "") {
      name = name.replace(
        new RegExp(searchQuery, "gi"),
        `<span class="highlight">${searchQuery}</span>`
      );
    }

    let badge =
      task.status === "completed"
        ? `<span class="badge bg-success">Completed</span>`
        : task.status === "pending"
        ? `<span class="badge bg-warning text-dark">Pending</span>`
        : `<span class="badge bg-primary">In Progress</span>`;

    html += `
      <tr>
        <td>${name}</td>
        <td>${badge}</td>
        <td>${task.due}</td>
        <td>
          <button onclick="editTask(${index})" class="btn btn-warning btn-sm">Edit</button>
          <button onclick="deleteTask(${index})" class="btn btn-danger btn-sm">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("taskTable").innerHTML = html;
}

// add / update
function handleSubmit(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const status = document.getElementById("status").value;
  const due = document.getElementById("due").value;
  const notes = document.getElementById("notes").value;
  const index = document.getElementById("editIndex").value;

  if (!name || !status || !due) return;

  if (index === "") {
    tasks.push({ name, status, due, notes });
  } else {
    tasks[index] = { name, status, due, notes };
  }

  localStorage.setItem("tasks", JSON.stringify(tasks));

  resetForm();
  renderTasks();
}

// edit
function editTask(index) {
  const task = tasks[index];

  document.getElementById("name").value = task.name;
  document.getElementById("status").value = task.status;
  document.getElementById("due").value = task.due;
  document.getElementById("notes").value = task.notes;

  document.getElementById("editIndex").value = index;
  document.getElementById("formTitle").textContent = "Edit Task";
}

// delete
function deleteTask(index) {
  if (confirm("Delete this task?")) {
    tasks.splice(index, 1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    renderTasks();
  }
}

// search
function handleSearch(e) {
  e.preventDefault();
  searchQuery = document.getElementById("searchInput").value;
  renderTasks();
}

// reset
function resetForm() {
  document.querySelector("form").reset();
  document.getElementById("editIndex").value = "";
  document.getElementById("formTitle").textContent = "Add New Task";
}

// dark mode
const toggleBtn = document.getElementById("themeToggle");
  const body = document.body;

  // load saved theme
  if (localStorage.getItem("theme") === "dark") {
    body.classList.add("dark-mode");
    toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
  } else {
    toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
  }

  toggleBtn.addEventListener("click", () => {
    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
      localStorage.setItem("theme", "dark");
    } else {
      toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
      localStorage.setItem("theme", "light");
    }
  });

// logout
function logout() {
  localStorage.removeItem("loggedIn");
}

// init
renderTasks();

</script>

</body>
</html>
