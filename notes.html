<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Notes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold">Task Manager</a>

    <div class="d-flex align-items-center">

      <a href="dashboard.html" class="nav-link text-white mx-2 nav-hover">Dashboard</a>
      <a href="tasks.html" class="nav-link text-white mx-2 nav-hover">Tasks</a>
      <a href="completed.html" class="nav-link text-white mx-2 nav-hover">Completed</a>
      <a href="notes.html" class="nav-link text-white mx-2 nav-hover">Notes</a>

      <button id="themeToggle" class="btn btn-light ms-3">
       <i class="bi bi-moon"></i>
      </button>

      <a href="login.html" class="btn btn-danger btn-sm ms-3" onclick="logout()">Logout</a>

    </div>
  </div>
</nav>

<div class="container mt-4 flex-grow-1">
<div style="margin-top: 90px;" class="container">

<h3 class="mb-4">Task Notes</h3>

<div id="notesContainer"></div>

</div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 Task Manager System | Built by Ifwat
</footer>

<script>

// login check
if (!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}

// ambil tasks
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// render notes
let html = "";

if (tasks.length === 0) {
  html = "<p>No tasks yet</p>";
} else {
  tasks.forEach(task => {
    html += `
      <div class="card p-3 mb-3 shadow-sm border-0">
        <h5>${task.name}</h5>

        <p>
          <strong>Status:</strong> ${capitalize(task.status)}<br>
          <strong>Due:</strong> ${task.due}
        </p>

        <hr>

        <p>
          ${task.notes ? task.notes : "<em>No notes added</em>"}
        </p>
      </div>
    `;
  });
}

document.getElementById("notesContainer").innerHTML = html;

// capitalize function
function capitalize(text) {
  return text.charAt(0).toUpperCase() + text.slice(1);
}

// dark mode
const toggleBtn = document.getElementById("themeToggle");
  const body = document.body;

  // load saved theme
  if (localStorage.getItem("theme") === "dark") {
    body.classList.add("dark-mode");
    toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
  } else {
    toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
  }

  toggleBtn.addEventListener("click", () => {
    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
      localStorage.setItem("theme", "dark");
    } else {
      toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
      localStorage.setItem("theme", "light");
    }
  });

// logout
function logout() {
  localStorage.removeItem("loggedIn");
}

</script>

</body>
</html>
