<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<div style="margin-top: 80px;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold">Task Manager</a>

    <div class="d-flex align-items-center">

      <a href="dashboard.html" class="nav-link text-white mx-2 nav-hover">Dashboard</a>
      <a href="tasks.html" class="nav-link text-white mx-2 nav-hover">Tasks</a>
      <a href="completed.html" class="nav-link text-white mx-2 nav-hover">Completed</a>
      <a href="notes.html" class="nav-link text-white mx-2 nav-hover">Notes</a>

      <button id="themeToggle" class="btn btn-light ms-3">
       <i class="bi bi-moon"></i>
      </button>

      <a href="login.html" class="btn btn-danger btn-sm ms-3" onclick="logout()">Logout</a>

    </div>
  </div>
</nav>

<div class="container mt-4 flex-grow-1">
<h3 class="mb-4">Dashboard</h3>

<!-- CARDS -->
<div class="row">

  <div class="col-md-3 mb-3">
    <div class="card p-3 shadow-sm border-0">
      <h6>Total Tasks</h6>
      <h2 id="total"></h2>
    </div>
  </div>

  <div class="col-md-3 mb-3">
    <div class="card p-3 shadow-sm border-0">
      <h6>Completed</h6>
      <h2 id="completed"></h2>
    </div>
  </div>

  <div class="col-md-3 mb-3">
    <div class="card p-3 shadow-sm border-0">
      <h6>Pending</h6>
      <h2 id="pending"></h2>
    </div>
  </div>

  <div class="col-md-3 mb-3">
    <div class="card p-3 shadow-sm border-0">
      <h6>In Progress</h6>
      <h2 id="inprogress"></h2>
    </div>
  </div>

</div>

<!-- CHART -->
<div class="card p-4 shadow-sm border-0 mt-4">
  <h5 class="mb-3">Task Overview</h5>
  <div style="max-width: 400px; margin: auto;">
    <canvas id="taskChart"></canvas>
  </div>
</div>

<!-- UPCOMING -->
<div class="card p-4 shadow-sm border-0 mt-4">
  <h5 class="mb-3">Upcoming Deadlines</h5>
  <ul class="list-group" id="upcomingList"></ul>
</div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2026 Task Manager System | Built by Ifwat
</footer>

<!-- SCRIPT -->
<script>

// login check
if (!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}

// ambil data
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// count
let total = tasks.length;
let completed = 0;
let pending = 0;
let inprogress = 0;

tasks.forEach(task => {
  if (task.status === "completed") completed++;
  else if (task.status === "pending") pending++;
  else if (task.status === "in progress") inprogress++;
});

// display
document.getElementById("total").textContent = total;
document.getElementById("completed").textContent = completed;
document.getElementById("pending").textContent = pending;
document.getElementById("inprogress").textContent = inprogress;

// upcoming
let today = new Date();
let upcomingHTML = "";

tasks.forEach(task => {
  let due = new Date(task.due);
  let diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));

  if (diff >= 0 && diff <= 7) {
    let badge = diff <= 3
      ? `<span class="badge bg-danger">${diff} days left</span>`
      : `<span class="badge bg-warning text-dark">${diff} days left</span>`;

    upcomingHTML += `
      <li class="list-group-item d-flex justify-content-between">
        ${task.name}
        ${badge}
      </li>
    `;
  }
});

document.getElementById("upcomingList").innerHTML =
  upcomingHTML || `<li class="list-group-item">No upcoming tasks</li>`;

// chart
new Chart(document.getElementById('taskChart'), {
  type: 'pie',
  data: {
    labels: ['Completed', 'Pending', 'In Progress'],
    datasets: [{
      data: [completed, pending, inprogress],
      backgroundColor: ['#28a745', '#ffc107', '#0d6efd']
    }]
  }
});

// dark mode
const toggleBtn = document.getElementById("themeToggle");
  const body = document.body;

  // load saved theme
  if (localStorage.getItem("theme") === "dark") {
    body.classList.add("dark-mode");
    toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
  } else {
    toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
  }

  toggleBtn.addEventListener("click", () => {
    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
      localStorage.setItem("theme", "dark");
    } else {
      toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
      localStorage.setItem("theme", "light");
    }
  });

// logout
function logout() {
  localStorage.removeItem("loggedIn");
}

</script>

</body>
</html>
