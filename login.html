<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Vanta Background -->
  <div id="vanta-bg" class="d-flex align-items-center justify-content-center vh-100">

    <div class="col-12 col-sm-10 col-md-6 col-lg-5 mx-auto">

      <div class="card login-card p-5 shadow-lg border-0 rounded-4">

        <!-- Branding -->
        <h3 class="text-center fw-bold">Task Manager</h3>
        <p class="text-center text-muted mb-4">Student System</p>

        <!-- Error -->
        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <!-- Form -->
        <form id="loginForm">

          <!-- Username -->
          <div class="input-group mb-3">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" id="username" class="form-control" placeholder="Username">
          </div>

          <!-- Password -->
          <div class="input-group mb-3">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" id="password" class="form-control" placeholder="Password">
          </div>

          <!-- Button -->
          <button class="btn btn-primary w-100">Login</button>

        </form>

      </div>

    </div>

  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <!-- Vanta Waves -->
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

  <!-- Vanta Init -->
  <script>
  VANTA.WAVES({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200,
    minWidth: 200,
    scale: 1,
    scaleMobile: 1,
    color: 0x42024,
    shininess: 80,
    waveHeight: 12,
    waveSpeed: 0.6,
    zoom: 1
  });
  </script>

  <!-- LOGIN LOGIC -->
  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "" || password === "") {
        errorMsg.textContent = "Please fill in all fields!";
        errorMsg.classList.remove("d-none");
      } else {
        // simulate login
        localStorage.setItem("loggedIn", "true");

        window.location.href = "dashboard.html";
      }
    });
  </script>

</body>
</html>
